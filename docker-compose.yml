version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: outrahora_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-outrahora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-outrahora_secret}
      POSTGRES_DB: ${DB_NAME:-outrahora}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-outrahora}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: outrahora_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
